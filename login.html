<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 프리미엄 앱</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- 배경 요소 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <h1>다시 오신 것을 환영합니다</h1>
        <p class="subtitle">세부 정보를 입력하여 로그인해 주세요.</p>

        <form id="login-form" action="#" method="POST">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">로그인</button>
        </form>

        <div class="footer">
            계정이 없으신가요? <a href="#" id="signup-link">무료로 가입하세요</a><br>
            <button type="button" id="home-btn" style="margin-top: 10px; background: transparent; color: var(--text-muted); border: 1px solid var(--glass-border); font-size: 0.8rem; padding: 8px;">홈으로 돌아가기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
