<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 프리미엄 앱</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- 배경 요소 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <h1>계정 생성</h1>
        <p class="subtitle">오늘 바로 가입하세요! 언제나 무료입니다.</p>

        <form id="signup-form" action="#" method="POST">
            <div class="form-group">
                <label for="name">전체 이름</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>

            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">비밀번호 확인</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
            </div>

            <button type="submit">계정 생성</button>
        </form>

        <div class="footer">
            이미 계정이 있으신가요? <a href="#" id="login-link">여기서 로그인하세요</a><br>
            <button type="button" id="home-btn" style="margin-top: 10px; background: transparent; color: var(--text-muted); border: 1px solid var(--glass-border); font-size: 0.8rem; padding: 8px;">홈으로 돌아가기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
